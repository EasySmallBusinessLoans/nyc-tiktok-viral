name: TikTok Viral Watch

on:
  schedule:
    # Fires twice daily in UTC to cover both Mountain Time offsets across
    # daylight saving (MDT UTC-6 / MST UTC-7). check-viral.js checks the
    # actual current Mountain time and only proceeds on the one that's
    # really 7am there - the other is a near-free no-op (no Apify calls).
    - cron: "0 13 * * *" # 7:00 AM MDT
    - cron: "0 14 * * *" # 7:00 AM MST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tiktok-viral-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for viral videos
        env:
          # APIFY_TOKEN is out of credits - dropped from the list for now,
          # add it back (or a fresh token) once it has balance again.
          APIFY_TOKENS: ${{ secrets.APIFY_TOKEN_2 }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APIFY_ACTOR_ID: apidojo~tiktok-scraper
          VIEW_THRESHOLD: "500000"
          LIKE_THRESHOLD: "100000"
          RESULTS_PER_HASHTAG: "10"
          MAX_ALERTS_PER_RUN: "5"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/check-viral.js

      - name: Persist seen-video state
        run: |
          git config user.name "tiktok-viral-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || git commit -m "chore: update seen video state [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push
