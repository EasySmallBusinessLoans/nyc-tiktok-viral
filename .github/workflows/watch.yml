name: TikTok Viral Watch

on:
  schedule:
    # GitHub's schedule trigger is best-effort: observed 1.5-3+ hour delays
    # every day for a week, and on 2026-07-09 didn't fire at all. Two
    # mitigations here: (1) off-the-hour minutes, since GitHub documents
    # the top of every hour as their highest-congestion window; (2)
    # multiple redundant triggers spread across the morning covering both
    # Mountain Time DST offsets (MDT UTC-6 / MST UTC-7), so one dropped
    # trigger doesn't mean the whole day is silently skipped. Skipped runs
    # cost ~15s and zero Apify calls - check-viral.js only does real work
    # once per Mountain-time day, no earlier than 7am; whichever trigger
    # fires first after that does the work, the rest no-op.
    - cron: "7 13 * * *"
    - cron: "7 14 * * *"
    - cron: "37 13 * * *"
    - cron: "37 14 * * *"
    - cron: "7 15 * * *"
    - cron: "7 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tiktok-viral-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for viral videos
        env:
          # APIFY_TOKEN is out of credits - dropped from the list for now,
          # add it back (or a fresh token) once it has balance again.
          APIFY_TOKENS: ${{ secrets.APIFY_TOKEN_2 }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APIFY_ACTOR_ID: clockworks~tiktok-scraper
          VIEW_THRESHOLD: "500000"
          COMBO_LIKE_THRESHOLD: "50000"
          LIKE_THRESHOLD: "100000"
          RESULTS_PER_HASHTAG: "10"
          # MAX_ALERTS_PER_RUN intentionally unset - uncapped, alerts on
          # every video that qualifies. Set to a number to re-cap it.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/check-viral.js

      - name: Persist seen-video state
        run: |
          git config user.name "tiktok-viral-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || git commit -m "chore: update seen video state [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push
